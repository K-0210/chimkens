<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Information</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: url('https://static.vecteezy.com/system/resources/previews/000/575/924/original/gray-and-white-color-geometric-modern-design-for-background-with-copy-space-vector-illustration.jpg') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      color: white;
    }

    .top-left {
      margin: 30px;
    }

     .profile-box {
      display: inline-block;
      background-color: black;
      padding: 12px 30px;
        border-radius: 8px;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .profile-subtext {
      margin-top: 8px;
      font-size: 16px;
      color: white;
    }

    .m-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      padding: 20px;
    }

   
    .info-box {
      background: white;
      border: 3px solid rgb(39, 39, 104);
      padding: 40px;
      width: 350px;
      border-radius: 10px;
    }

    .info-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: gray;
    }

    .info-item {
      margin-bottom: 20px;
    }

    .label {
      font-size: 15px;
      color: gray;
    }

    .value {
      font-size: 18px;
      font-weight: bold;
      margin-top: 5px;
      color: darkgray;
    }

  
    .change-btn {
      width: 100%;
      padding: 12px;
      background-color: rgb(55, 55, 112);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 5px;
    }

    .change-btn:hover {
      background-color: rgb(30, 30, 82);
    }


    .profile-section {
      text-align: center;
    }

    .profile-pic {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      display: block;
      margin-bottom: 20px;
    }

    .file-upload {
      color: white;
      font-size: 15px;
    }

    input[type="file"] {
      margin-top: 10px;
      color: white;
    }

  </style>
</head>
<body>

  <div class="top-left">
    <div class="profile-box">PROFILE</div>
    <div class="profile-subtext">Student Information.</div>
  </div>

 
  <div class="m-container">


    <div class="info-box">
      <h2>Student Information</h2>

      <div class="info-item">
        <div class="label">Student ID</div>
        <div class="value">SN676767</div>
      </div>

      <div class="info-item">
        <div class="label">Contact Number</div>
        <div class="value">+6345677837</div>
      </div>

      <div class="info-item">
        <div class="label">Email Address</div>
        <div class="value">student@email.com</div>
      </div>

      <div class="info-item">
        <div class="label">Gender</div>
        <div class="value">Female</div>
      </div>

      <button class="change-btn">Change Password</button>
    </div>

   
    <div class="profile-section">
      <img src="https://img.freepik.com/premium-vector/profile-icon_1134231-1698.jpg" alt="Profile Picture" class="profile-pic">
      <div class="file-upload">
        <input type="file">
      </div>
    </div>

  </div>

</body>
</html>
